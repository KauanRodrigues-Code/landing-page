<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Fitness Center | A mais moderna de Arapoti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <img src="logo-dna.png" alt="DNA Fitness Logo" class="logo">
            <button class="btn-cta-nav">Matricule-se</button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>SUA MELHOR VERSÃO COMEÇA NO <span>DNA</span></h1>
            <p>Musculação, Jiu-Jitsu e Ginástica na academia mais completa de Arapoti.</p>
            <a href="#planos" class="btn-main">CONHECER PLANOS</a>
        </div>
    </section>

    <section id="planos" class="pricing">
        <h2>NOSSOS PLANOS</h2>
        <div class="grid-planos">
            <div class="plano">
                <h3>MENSAL</h3>
                <p class="price">R$ 148,00</p>
            </div>
            <div class="plano destaque">
                <span class="badge">MAIS VENDIDO</span>
                <h3>ANUAL</h3>
                <p class="price">R$ 128,00</p>
                <small>/mês</small>
            </div>
            <div class="plano">
                <h3>FAMÍLIA</h3>
                <p>A partir de</p>
                <p class="price">R$ 133,00</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
