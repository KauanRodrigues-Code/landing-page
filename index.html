<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Fitness Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="navbar">
        <div class="logo">DNA <span>FITNESS</span></div>
        <a href="https://wa.me/5543999999999" class="btn-nav">MATRICULE-SE</a>
    </header>

    <section class="hero">
        <div class="hero-content reveal">
            <h1>SUA MELHOR VERSÃO <br><span>COMEÇA NO DNA</span></h1>
            <p>Musculação, Jiu-Jitsu e Ginástica na academia mais completa de Arapoti.</p>
            <a href="#planos" class="btn-main">CONHECER PLANOS</a>
        </div>
    </section>

    <main class="container" id="planos">
        <h2 class="section-title reveal">NOSSOS PLANOS</h2>
        
        <div class="plans-grid">
            <div class="plan-card reveal">
                <h3>MENSAL</h3>
                <div class="price">R$ 148,00</div>
            </div>

            <div class="plan-card featured reveal">
                <div class="badge">MAIS VENDIDO</div>
                <h3>ANUAL</h3>
                <div class="price">R$ 128,00</div>
                <div class="period">/mês</div>
            </div>

            <div class="plan-card reveal">
                <h3>FAMÍLIA</h3>
                <p>A partir de</p>
                <div class="price">R$ 133,00</div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
